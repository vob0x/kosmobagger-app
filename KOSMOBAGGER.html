<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>KOSMOBAGGER — Das Duell</title>
<meta name="description" content="Maschinen kämpfen um Energiekristalle — Kartenduell gegen den Computer oder zu zweit." />
<meta name="theme-color" content="#0b1022" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="icon" href="icons/favicon-64.png" />
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="KOSMOBAGGER" />
<style>
:root{
  --bg0:#0b1020; --bg1:#141c33; --panel:#1b2440; --line:#2c3960;
  --ink:#eef2ff; --dim:#9fb0d6; --gold:#ffcf3f; --good:#37c86a; --bad:#ff5a5a;
  --cardw: 128px; --cardh: 179px;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  color:var(--ink);
  background:
    radial-gradient(1200px 700px at 50% -10%, #24305a 0%, var(--bg1) 45%, var(--bg0) 100%);
  overflow:hidden; user-select:none; -webkit-user-select:none;
}
#app{height:100vh;position:relative}
.screen{position:absolute;inset:0}
.hidden{display:none !important}

/* ---------- Menue ---------- */
#menu{display:flex;align-items:center;justify-content:center}
.menu-box{width:min(560px,92vw);background:rgba(20,28,52,.86);border:1px solid var(--line);
  border-radius:20px;padding:28px 30px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.menu-box h1{margin:0;font-size:44px;letter-spacing:2px;
  background:linear-gradient(180deg,#ffe487,#ffb01f);-webkit-background-clip:text;background-clip:text;color:transparent;
  text-shadow:0 2px 0 rgba(0,0,0,.25)}
.menu-box .sub{margin:2px 0 22px;color:var(--dim)}
.opt{margin:14px 0}
.opt>label{display:block;font-size:13px;color:var(--dim);margin-bottom:6px;text-transform:uppercase;letter-spacing:1px}
.seg{display:flex;gap:8px;flex-wrap:wrap}
.seg button{flex:1;min-width:90px;padding:11px 10px;border-radius:11px;border:1px solid var(--line);
  background:#131a30;color:var(--ink);font-size:14px;cursor:pointer;transition:.12s}
.seg button:hover{border-color:#4a5c94}
.seg button.on{background:linear-gradient(180deg,#3a5bd0,#2b47ab);border-color:#6b83d6;box-shadow:0 4px 14px rgba(43,71,171,.5)}
.big{margin-top:20px;width:100%;padding:15px;border:0;border-radius:13px;cursor:pointer;
  font-size:18px;font-weight:700;color:#20160a;background:linear-gradient(180deg,#ffd85e,#f5a81c);
  box-shadow:0 8px 22px rgba(245,168,28,.45)}
.big:hover{filter:brightness(1.05)}
.hint{margin-top:16px;color:var(--dim);font-size:12.5px;line-height:1.5}

/* ---------- Tisch ---------- */
#table{display:flex;flex-direction:column}
.side{padding:8px 12px}
.side.opp{border-bottom:1px solid var(--line);background:rgba(10,15,30,.35)}
.side.me{border-top:1px solid var(--line);background:rgba(10,15,30,.5)}
.pinfo{display:flex;align-items:center;gap:16px;font-size:15px}
.pname{font-weight:700;min-width:120px}
.res{background:#0e1730;border:1px solid var(--line);border-radius:20px;padding:3px 12px;display:inline-flex;align-items:center;gap:6px}
.res b{font-size:16px}
.pips{display:inline-flex;gap:3px;margin-left:4px}
.pips span{width:9px;height:9px;border-radius:50%;background:#2a3a63;border:1px solid #40538c}
.pips span.f{background:var(--gold);border-color:#caa41f}
.pips span.b{background:var(--good);border-color:#2a8f4c}
.crystals{margin-left:auto;font-size:15px;display:inline-flex;align-items:center;gap:4px;font-weight:700}
.crystals .gem{color:#57d0e8}

.handrow{display:flex;gap:8px;justify-content:center;align-items:flex-end;min-height:calc(var(--cardh) + 8px);
  padding-top:6px;flex-wrap:nowrap}
.opphand{min-height:70px}
.opphand .card{width:52px;height:73px;--cardw:52px;--cardh:73px}

#battle{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;position:relative;
  background:radial-gradient(600px 300px at 50% 50%, rgba(60,80,150,.18), transparent 70%)}
.slot-wrap{display:flex;flex-direction:column;align-items:center;gap:4px}
.slotlabel{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:1px}
.slot{width:var(--cardw);height:var(--cardh);border-radius:12px;border:2px dashed #33436f;
  display:flex;align-items:center;justify-content:center;background:rgba(10,16,32,.4)}
.slot.empty::after{content:"leer";color:#43537f;font-size:12px}
#centerMsg{min-height:26px;font-size:19px;font-weight:800;text-align:center;letter-spacing:.3px}
#centerMsg .vs{color:var(--dim);font-weight:600;margin:0 8px}

/* ---------- Karten ---------- */
.card{width:var(--cardw);height:var(--cardh);border-radius:11px;position:relative;flex:0 0 auto;
  background-size:cover;background-position:center;box-shadow:0 6px 16px rgba(0,0,0,.5);
  transition:transform .14s, box-shadow .14s, outline-color .14s;outline:3px solid transparent;background-color:#0d1428}
.hand .card{cursor:pointer}
.hand .card:hover{transform:translateY(-14px) scale(1.04);box-shadow:0 16px 30px rgba(0,0,0,.6);z-index:5}
.card.sel{outline-color:var(--gold);transform:translateY(-16px) scale(1.05)}
.card.dis{filter:grayscale(.75) brightness(.42);cursor:not-allowed;opacity:.9}
.hand .card.dis:hover{transform:none;box-shadow:0 6px 16px rgba(0,0,0,.5)}
.card.back{background-color:#101a37}
.card .cost{position:absolute;top:5px;right:5px;display:flex;gap:2px}
.card .cost i{width:12px;height:12px;border-radius:3px;background:var(--gold);box-shadow:0 0 0 1px #000}
.card .turbobadge{position:absolute;bottom:5px;left:5px;background:var(--good);color:#06210f;font-weight:800;
  font-size:11px;padding:1px 6px;border-radius:8px;box-shadow:0 1px 3px rgba(0,0,0,.5)}
.card.reveal{animation:flip .5s ease}
@keyframes flip{0%{transform:rotateY(90deg) scale(.9)}100%{transform:rotateY(0) scale(1)}}
.card.win{outline:3px solid var(--good);box-shadow:0 0 26px rgba(55,200,106,.7)}
.card.lose{animation:tumble .6s ease forwards}
@keyframes tumble{to{transform:translateY(80px) rotate(18deg) scale(.7);opacity:0}}

/* ---------- Aktionsleiste ---------- */
#actionbar{position:absolute;bottom:calc(var(--cardh) + 60px);left:50%;transform:translateX(-50%);
  display:flex;gap:10px;flex-wrap:wrap;justify-content:center;max-width:92vw;z-index:20}
#actionbar button{padding:10px 16px;border-radius:11px;border:1px solid #6b83d6;cursor:pointer;font-size:14px;font-weight:600;
  background:linear-gradient(180deg,#3a5bd0,#2b47ab);color:#fff;box-shadow:0 6px 16px rgba(43,71,171,.4)}
#actionbar button.ghost{background:#131a30;border-color:var(--line);color:var(--dim)}
#actionbar button:hover{filter:brightness(1.08)}

#menuBtn{position:absolute;top:8px;right:10px;z-index:30;background:#131a30;color:var(--ink);
  border:1px solid var(--line);border-radius:9px;width:36px;height:32px;cursor:pointer;font-size:16px}

/* ---------- Overlay ---------- */
#overlay{position:absolute;inset:0;background:rgba(5,8,18,.72);backdrop-filter:blur(4px);
  display:flex;align-items:center;justify-content:center;z-index:50}
#overlay-inner{background:rgba(22,30,54,.96);border:1px solid var(--line);border-radius:18px;
  padding:26px 30px;text-align:center;max-width:min(560px,92vw);box-shadow:0 24px 70px rgba(0,0,0,.6)}
#overlay-inner h2{margin:.2em 0 .3em;font-size:28px}
#overlay-inner p{color:var(--dim);margin:.3em 0 1em}
#overlay-inner .big{max-width:280px;margin-left:auto;margin-right:auto}
.pass-emoji{font-size:52px;margin:6px}
.winbanner{font-size:36px;font-weight:800;color:var(--gold);text-shadow:0 2px 18px rgba(255,207,63,.5)}
.wingems{font-size:26px;color:#57d0e8;letter-spacing:5px;margin:.25em 0 .1em;text-shadow:0 0 14px rgba(87,208,232,.7)}
canvas.confetti{position:fixed;inset:0;z-index:60;pointer-events:none}

/* Score als Edelstein-Reihe */
.crystals{gap:5px}
.crystals .cg{width:15px;height:15px;transform:rotate(45deg);border-radius:3px;background:#22314f;border:1px solid #3a4c78;display:inline-block}
.crystals .cg.on{background:linear-gradient(135deg,#8cebff,#2aa7d8);border-color:#d6f6ff;box-shadow:0 0 9px rgba(87,208,232,.75)}
.crystals b{margin-left:9px;font-size:17px}
.crystals.pulse{animation:scorepop .6s ease}
@keyframes scorepop{0%{transform:scale(1)}30%{transform:scale(1.35)}100%{transform:scale(1)}}

/* Drag-and-Drop */
.card.dragghost{position:fixed;z-index:999;pointer-events:none;transform:translate(-50%,-50%) rotate(-4deg);opacity:.96;box-shadow:0 22px 44px rgba(0,0,0,.6)}
.slot.drop{border-color:var(--gold);background:rgba(255,207,63,.12);box-shadow:inset 0 0 24px rgba(255,207,63,.45)}

.acthint{flex-basis:100%;order:-1;text-align:center;color:var(--dim);font-size:13px;margin-bottom:2px}

/* Karte faellt beim Aufdecken in den Slot */
.slot .card.reveal{animation:dropflip .5s ease}
@keyframes dropflip{0%{transform:translateY(-46px) rotateX(55deg) scale(.9);opacity:.15}100%{transform:none;opacity:1}}

#muteBtn{position:absolute;top:8px;right:52px;z-index:30;background:#131a30;color:var(--ink);
  border:1px solid var(--line);border-radius:9px;width:36px;height:32px;cursor:pointer;font-size:15px}

/* ============ v2: kosmisch-industrieller Look ============ */
#bg{position:fixed;inset:0;z-index:-1;pointer-events:none}
#fx{position:fixed;inset:0;z-index:55;pointer-events:none}
body{background:radial-gradient(1200px 820px at 50% -18%, #1b2648 0%, #0b1022 55%, #060a15 100%)}
#app{position:relative;z-index:1}

@keyframes shake{
  10%,90%{transform:translateX(calc(var(--sh,6px)*-.35))}
  20%,80%{transform:translateX(calc(var(--sh,6px)*.6))}
  30%,50%,70%{transform:translateX(calc(var(--sh,6px)*-1))}
  40%,60%{transform:translateX(var(--sh,6px))}
}

/* Glas-Panels */
.side{background:linear-gradient(180deg,rgba(22,30,56,.55),rgba(12,18,36,.32));backdrop-filter:blur(9px);-webkit-backdrop-filter:blur(9px);border-color:rgba(120,150,220,.18)}
.pname{font-weight:800;letter-spacing:.3px;text-shadow:0 2px 8px rgba(0,0,0,.5)}
.res{background:linear-gradient(180deg,rgba(14,23,48,.92),rgba(8,14,32,.92));border-color:rgba(120,150,220,.32);box-shadow:inset 0 1px 0 rgba(255,255,255,.07)}

/* Score-HUD leuchtet */
.crystals .cg{width:16px;height:16px}
.crystals .cg.on{box-shadow:0 0 13px rgba(120,225,255,.9),0 0 3px #fff}
.crystals b{font-size:18px;text-shadow:0 0 10px rgba(120,225,255,.45)}

/* Battlefield */
#battle{background:radial-gradient(720px 380px at 50% 50%,rgba(80,110,205,.15),transparent 72%)}
.slot{border-radius:14px;border:2px dashed rgba(120,150,220,.35);background:rgba(10,16,34,.32);box-shadow:inset 0 0 34px rgba(60,90,180,.13)}
.slot .card{box-shadow:0 12px 32px rgba(0,0,0,.62),0 0 0 1px rgba(255,255,255,.05)}
.slotlabel{letter-spacing:2px;opacity:.85}
#centerMsg{font-size:22px;font-weight:900;letter-spacing:.4px;text-shadow:0 2px 14px rgba(0,0,0,.7),0 0 22px rgba(120,180,255,.28)}

/* Karten */
.card{box-shadow:0 8px 20px rgba(0,0,0,.55)}
.card.win{outline:3px solid #6dffa6;box-shadow:0 0 36px rgba(80,255,150,.85),0 0 0 2px #6dffa6}
.card.reveal{filter:drop-shadow(0 0 18px rgba(120,180,255,.5))}
.card.sel{outline:3px solid var(--gold);box-shadow:0 0 28px rgba(255,207,63,.75)}

/* Hand-Fächer */
.handrow{padding-top:16px;perspective:1000px;overflow:visible}
.handcard{transition:transform .22s cubic-bezier(.2,.8,.2,1);transform-origin:bottom center}
.handcard .card{transition:transform .18s,box-shadow .18s,filter .18s}
.hand .handcard.play:hover{z-index:20}
.hand .handcard.play:hover .card{transform:translateY(-42px) scale(1.16) rotate(calc(-1*var(--rot)));box-shadow:0 28px 48px rgba(0,0,0,.72),0 0 28px rgba(120,180,255,.45)}

/* Buttons glossy */
#actionbar button{background:linear-gradient(180deg,#4a6ff0,#2b47ab);border-color:#7d95e6;box-shadow:0 8px 20px rgba(43,71,171,.5),inset 0 1px 0 rgba(255,255,255,.25)}
.big{box-shadow:0 10px 26px rgba(245,168,28,.5),inset 0 1px 0 rgba(255,255,255,.4)}
.seg button.on{box-shadow:0 6px 18px rgba(43,71,171,.6),inset 0 1px 0 rgba(255,255,255,.2)}

/* Overlay */
#overlay-inner{background:linear-gradient(180deg,rgba(26,36,66,.96),rgba(16,22,44,.96));border-color:rgba(120,150,220,.3);box-shadow:0 30px 90px rgba(0,0,0,.7),0 0 0 1px rgba(255,255,255,.05)}
#menuBtn,#muteBtn{background:linear-gradient(180deg,rgba(20,28,52,.9),rgba(12,18,36,.9));border-color:rgba(120,150,220,.3)}

/* ===== v3: Spielgrafiken im UI ===== */
#bg{z-index:-2}
#arena{position:fixed;inset:0;z-index:-1;background-size:cover;background-position:center;opacity:.55;filter:saturate(.9) brightness(.7)}
#arena::after{content:"";position:absolute;inset:0;background:radial-gradient(1200px 820px at 50% 42%,transparent,rgba(7,11,22,.68))}

/* HUD aus Icons: Tank / Batterie / Kristalle */
.res{padding:4px 10px;gap:5px}
.res .cell{width:22px;height:22px;display:inline-flex;align-items:center;justify-content:center}
.res .cell img{width:100%;height:100%;object-fit:contain;filter:grayscale(1) brightness(.45);opacity:.42;transition:.2s}
.res .cell.on img{filter:drop-shadow(0 0 5px rgba(255,200,80,.75));opacity:1}
.res.batt .cell.on img{filter:drop-shadow(0 0 5px rgba(90,230,140,.8))}
.crystals{gap:4px}
.crystals .cell{width:22px;height:22px;display:inline-flex}
.crystals .cell img{width:100%;height:100%;object-fit:contain;filter:grayscale(1) brightness(.5);opacity:.38;transition:.2s}
.crystals .cell.on img{filter:drop-shadow(0 0 9px rgba(120,225,255,.95));opacity:1}
.crystals b{margin-left:8px}
.opp .res .cell,.opp .res .cell img{width:18px;height:18px}
.opp .crystals .cell,.opp .crystals .cell img{width:18px;height:18px}

/* Deck-Stapel */
.deckpile{position:absolute;display:flex;flex-direction:column;align-items:center;gap:3px;z-index:2}
#oppDeck{top:8px;left:14px}
#meDeck{bottom:8px;left:14px}
.deckpile .dcard{width:46px;height:64px;border-radius:7px;background-size:cover;background-position:center;
  box-shadow:0 2px 0 #0b1730,0 4px 0 #0a1428,0 9px 15px rgba(0,0,0,.6),0 0 0 1px rgba(120,150,220,.28)}
.deckpile b{font-size:12px;color:var(--dim)}

/* Slots als Bau-Pads */
.slot{position:relative;border:2px solid rgba(120,150,220,.3);border-top-color:rgba(150,180,240,.42);
  background:linear-gradient(180deg,rgba(16,24,48,.5),rgba(8,14,32,.5))}
.slot::before{content:"";position:absolute;inset:-9px;border-radius:20px;z-index:-1;
  background:radial-gradient(130px 66px at 50% 100%,rgba(90,130,230,.2),transparent 70%)}

/* Menue-Logo + optionaler Hero */
#menuLogo{display:block;width:100px;height:100px;margin:0 auto 8px;border-radius:22px;
  filter:drop-shadow(0 10px 24px rgba(80,120,255,.55))}
.menu-box h1{margin-top:0}

/* ===== v4: mehr Arena-Animation ===== */
/* Licht-Sweep beim Aufdecken */
.slot .card.reveal::after{content:"";position:absolute;inset:0;border-radius:11px;overflow:hidden;
  background:linear-gradient(115deg,transparent 32%,rgba(255,255,255,.6) 50%,transparent 68%);
  transform:translateX(-130%);animation:shine .6s ease .12s}
@keyframes shine{to{transform:translateX(130%)}}
/* Sieger-Aufschlag */
.slot .card.win{animation:slam .42s cubic-bezier(.2,1.7,.4,1)}
@keyframes slam{0%{transform:scale(1.32)}55%{transform:scale(.93)}100%{transform:scale(1)}}
/* Verlierer zersplittert */
.slot .card.lose{animation:shatter .55s ease forwards}
@keyframes shatter{to{transform:translateY(70px) rotate(14deg) scale(.6);opacity:0;filter:blur(2px)}}
/* Stehende Maschine schwebt sanft */
.slot .card.idle{animation:bob 3.2s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
/* Screen-Flash */
#flash{position:fixed;inset:0;z-index:52;pointer-events:none;opacity:0;
  background:radial-gradient(circle at 50% 44%,rgba(180,210,255,.55),transparent 62%)}
#flash.on{animation:flashfade .38s ease}
@keyframes flashfade{0%{opacity:.9}100%{opacity:0}}
/* Hand-Karten 3D-Neigung beim Hover */
.hand .handcard.play:hover .card{filter:brightness(1.06)}
#menuHero{height:140px;margin:-6px -8px 14px;border-radius:14px;background-size:cover;background-position:center;
  box-shadow:inset 0 -46px 64px -22px rgba(16,22,44,.98),0 0 0 1px rgba(120,150,220,.22)}

/* ===== v5: mehr Arena-Feel ===== */
/* 3D-Flip beim Aufdecken (Perspektive am Slot) */
.slot{perspective:900px}
.slot .card.flipin{animation:flipin .5s cubic-bezier(.2,.85,.25,1)}
@keyframes flipin{0%{transform:rotateY(90deg) scale(.9);opacity:.2}55%{opacity:1}100%{transform:none;opacity:1}}

/* Karten ins Blatt austeilen (nur wenn sich das Blatt aendert) */
.card.deal{animation:dealin .34s cubic-bezier(.2,.9,.25,1) both;animation-delay:calc(var(--i,0)*55ms)}
@keyframes dealin{0%{transform:translateY(74px) scale(.6);opacity:0}100%{transform:none;opacity:1}}

/* Schwebende Kampf-Zahlen / Text */
/* Kampfzahlen: gross, dunkle Kontur, lange Standzeit (Zielgruppe muss sie in Ruhe lesen) */
.floattext{position:fixed;transform:translate(-50%,-50%);font-weight:900;font-size:30px;z-index:60;pointer-events:none;
  -webkit-text-stroke:3px rgba(6,10,22,.92);paint-order:stroke fill;
  text-shadow:0 3px 12px rgba(0,0,0,.9),0 0 24px rgba(0,0,0,.65);
  animation:floatup 2.2s cubic-bezier(.2,.9,.3,1) forwards}
.floattext.xl{font-size:56px;-webkit-text-stroke-width:4px}
@keyframes floatup{
  0%{opacity:0;transform:translate(-50%,-40%) scale(.4)}
  10%{opacity:1;transform:translate(-50%,-58%) scale(1.25)}
  20%{transform:translate(-50%,-60%) scale(1)}
  72%{opacity:1;transform:translate(-50%,-72%) scale(1)}      /* halten: hier wird gelesen */
  100%{opacity:0;transform:translate(-50%,-115%) scale(.95)}
}

/* Fliegendes Ressourcen-/Kristall-Icon zum HUD */
.flytoken{position:fixed;width:38px;height:38px;transform:translate(-50%,-50%);z-index:58;pointer-events:none;
  transition:left .52s cubic-bezier(.5,-0.15,.3,1.25),top .52s cubic-bezier(.5,-0.15,.3,1.25),transform .52s,opacity .52s;
  filter:drop-shadow(0 4px 12px rgba(0,0,0,.6)) drop-shadow(0 0 10px rgba(120,200,255,.75))}

/* Banner-Pop bei neuer Meldung */
#centerMsg.pop{animation:msgpop .4s cubic-bezier(.2,1.5,.4,1)}
@keyframes msgpop{0%{transform:scale(.7);opacity:.25}60%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}

/* Vorrats-Anzeige im Einkommen-Dialog (immer sichtbar fuer die Zielgruppe) */
.incstat{display:flex;gap:14px;justify-content:center;align-items:center;margin:4px 0 18px;flex-wrap:wrap}
.incstat span{display:inline-flex;align-items:center;gap:5px;background:rgba(12,20,42,.55);border:1px solid rgba(120,150,220,.28);border-radius:12px;padding:7px 11px}
.incstat .cell{width:32px;height:32px;display:inline-flex}
.incstat .cell img{width:100%;height:100%;object-fit:contain;filter:grayscale(1) brightness(.45);opacity:.32;transition:.2s}
.incstat .cell.on img{opacity:1;filter:drop-shadow(0 0 8px rgba(120,200,255,.85))}

/* Verdeckte, gespielte Karte (wartet auf das Aufdecken) */
.slot .card.pending{box-shadow:0 0 0 2px rgba(130,175,255,.45),0 0 24px rgba(90,140,240,.45);animation:pendpulse 1.5s ease-in-out infinite}
@keyframes pendpulse{0%,100%{filter:brightness(1)}50%{filter:brightness(1.14)}}
/* Umdrehen: Rueckseite dreht weg (dann kommt vorne per flipin herein) */
.slot .card.flipout{animation:flipout .19s ease-in forwards}
@keyframes flipout{to{transform:rotateY(90deg);opacity:.55}}
/* Booster-/Abschlepper-Kennzeichen oben rechts */
.card .specialbadge{position:absolute;top:6px;right:6px;font-size:22px;line-height:1;filter:drop-shadow(0 1px 3px rgba(0,0,0,.85))}

/* Erster Start: Intro als Vollbild-Splash ueber allem, Menue erst danach */
#introsplash{position:fixed;inset:0;z-index:200;background:#05070f;display:flex;align-items:center;justify-content:center;transition:opacity .5s ease}
#introsplash video{width:100%;height:100%;object-fit:cover}
#introsplash.gone{opacity:0;pointer-events:none}
#introskip{position:absolute;right:20px;bottom:18px;z-index:2;background:rgba(18,26,48,.82);color:#e8ecf5;
  border:1px solid rgba(150,180,240,.45);border-radius:13px;padding:12px 20px;font-size:16px;font-weight:700;cursor:pointer;
  box-shadow:0 6px 18px rgba(0,0,0,.5)}
#introskip:hover{background:rgba(30,40,70,.92)}
/* Vollbild-Videosequenz (Sieg/Niederlage) — gleiche Optik wie der Intro-Splash */
.fsvideo{position:fixed;inset:0;z-index:210;background:#05070f;display:flex;align-items:center;justify-content:center;transition:opacity .45s ease}
.fsvideo video{width:100%;height:100%;object-fit:cover}
.fsvideo.gone{opacity:0;pointer-events:none}
.fsskip{position:absolute;right:20px;bottom:18px;z-index:2;background:rgba(18,26,48,.82);color:#e8ecf5;
  border:1px solid rgba(150,180,240,.45);border-radius:13px;padding:12px 20px;font-size:16px;font-weight:700;cursor:pointer;box-shadow:0 6px 18px rgba(0,0,0,.5)}
.fsskip:hover{background:rgba(30,40,70,.92)}
.fssound{position:absolute;left:50%;bottom:20px;transform:translateX(-50%);z-index:2;
  background:rgba(18,26,48,.82);color:#ffd479;border:1px solid rgba(255,207,63,.5);border-radius:20px;
  padding:10px 18px;font-size:15px;font-weight:700;pointer-events:none;animation:sndpulse 1.6s ease-in-out infinite}
.fssound.gone{display:none}

#introsound{position:absolute;left:50%;bottom:20px;transform:translateX(-50%);z-index:2;
  background:rgba(18,26,48,.82);color:#ffd479;border:1px solid rgba(255,207,63,.5);border-radius:20px;
  padding:10px 18px;font-size:15px;font-weight:700;pointer-events:none;animation:sndpulse 1.6s ease-in-out infinite}
#introsound.gone{display:none}
@keyframes sndpulse{0%,100%{opacity:.75}50%{opacity:1}}

/* Menue-Hintergrund: Intro-Video, stumm in Endlosschleife. Im Spiel ausgeblendet
   (Ablenkung + Akku) -> dann uebernimmt wieder das Standbild #arena darunter. */
/* kein Fade: harter Schnitt beim Ansichtswechsel, sonst haengt der Layer im Zwischenzustand */
#introwrap{position:fixed;inset:0;z-index:-1;pointer-events:none}
body.playing #introwrap{display:none}
#introwrap video{width:100%;height:100%;object-fit:cover;opacity:.5;filter:saturate(.85) brightness(.6)}
#introwrap::after{content:"";position:absolute;inset:0;
  background:radial-gradient(1200px 820px at 50% 42%,transparent,rgba(7,11,22,.68))}
body.playing #introwrap{opacity:0}

/* Karte legen (~1 s): hebt ab, schwebt hoch ueber die Flaeche und setzt verdeckt auf */
.flycard{position:fixed;z-index:62;pointer-events:none;background-size:cover;background-position:center;
  border-radius:11px;
  transition:left .92s cubic-bezier(.34,.02,.24,1),top .92s cubic-bezier(.34,.02,.24,1),width .92s cubic-bezier(.34,.02,.24,1),height .92s cubic-bezier(.34,.02,.24,1)}
.flycard.hover{animation:hovercard .92s ease-in-out both}
@keyframes hovercard{
  0%{transform:translateY(0) scale(1) rotate(0);filter:drop-shadow(0 8px 14px rgba(0,0,0,.45))}
  42%{transform:translateY(-46px) scale(1.16) rotate(-3.5deg);filter:drop-shadow(0 36px 44px rgba(0,0,0,.6)) drop-shadow(0 0 22px rgba(120,180,255,.5))}
  100%{transform:translateY(0) scale(1) rotate(0);filter:drop-shadow(0 8px 16px rgba(0,0,0,.55))}
}
.flycard.land{animation:cardland .2s ease-out}
@keyframes cardland{0%{transform:scale(1.05)}60%{transform:scale(.97)}100%{transform:scale(1)}}

/* Ressourcen-Anzeige leuchtet auf, wenn das Symbol ankommt */
.tank.pulse,.batt.pulse{animation:scorepop .5s ease}

/* Kristallzaehler: kraeftiger und laenger pulsieren, damit der Punkt ankommt */
.crystals.pulse{animation:crystalpop 1.5s ease}
@keyframes crystalpop{
  0%{transform:scale(1)}18%{transform:scale(1.45)}38%{transform:scale(1.08)}
  56%{transform:scale(1.3)}76%{transform:scale(1.05)}100%{transform:scale(1)}
}

/* Neu gefuellte Zelle poppt deutlich auf, damit das Auffuellen sichtbar ist */
.cell.justfilled{animation:cellfill .6s cubic-bezier(.2,1.6,.35,1)}
@keyframes cellfill{0%{transform:scale(.45)}45%{transform:scale(1.7)}75%{transform:scale(.95)}100%{transform:scale(1)}}
.cell.justfilled img{animation:cellglow .6s ease}
@keyframes cellglow{0%{filter:brightness(2.6) drop-shadow(0 0 14px rgba(255,245,190,1))}100%{filter:none}}

/* Grosser Kristall beim Durchkommen: erst gross aufpoppen, dann in den Zaehler fliegen */
.bigcrystal{position:fixed;width:64px;height:64px;transform:translate(-50%,-50%) scale(.2);opacity:0;z-index:130;pointer-events:none;
  filter:drop-shadow(0 0 18px rgba(120,225,255,.95)) drop-shadow(0 0 34px rgba(90,180,255,.6));
  animation:crystalburst .55s cubic-bezier(.2,1.5,.35,1) forwards}
@keyframes crystalburst{
  0%{transform:translate(-50%,-50%) scale(.2) rotate(-25deg);opacity:0}
  55%{transform:translate(-50%,-50%) scale(1.55) rotate(8deg);opacity:1}
  100%{transform:translate(-50%,-50%) scale(1.25) rotate(0);opacity:1}
}

/* Durchkommen: die Maschine bricht durch die Luecke und kehrt auf den Bauplatz zurueck */
#meSlot .card.through{animation:throughUp 1.1s cubic-bezier(.3,0,.25,1)}
#oppSlot .card.through{animation:throughDown 1.1s cubic-bezier(.3,0,.25,1)}
@keyframes throughUp{
  0%{transform:translateY(0)}
  16%{transform:translateY(18px) scale(.95)}
  60%{transform:translateY(-185px) scale(1.06)}
  78%{transform:translateY(-185px) scale(1.06)}
  100%{transform:translateY(0) scale(1)}
}
@keyframes throughDown{
  0%{transform:translateY(0)}
  16%{transform:translateY(-18px) scale(.95)}
  60%{transform:translateY(185px) scale(1.06)}
  78%{transform:translateY(185px) scale(1.06)}
  100%{transform:translateY(0) scale(1)}
}

/* Kampfsequenz: die Maschinen gehen aufeinander los (Du unten, Gegner oben) */
#meSlot .card.fight{animation:fightUp 1.4s cubic-bezier(.4,0,.3,1)}
#oppSlot .card.fight{animation:fightDown 1.4s cubic-bezier(.4,0,.3,1)}
@keyframes fightUp{
  0%{transform:translateY(0)}
  22%{transform:translateY(10px) scale(.97)}                 /* ausholen */
  46%{transform:translateY(-30px) scale(1.06) rotate(-1.5deg)}
  62%{transform:translateY(-16px) scale(1.02)}
  84%{transform:translateY(-30px) scale(1.06) rotate(1.5deg)}
  100%{transform:translateY(-8px) scale(1.02)}
}
@keyframes fightDown{
  0%{transform:translateY(0)}
  22%{transform:translateY(-10px) scale(.97)}
  46%{transform:translateY(30px) scale(1.06) rotate(1.5deg)}
  62%{transform:translateY(16px) scale(1.02)}
  84%{transform:translateY(30px) scale(1.06) rotate(-1.5deg)}
  100%{transform:translateY(8px) scale(1.02)}
}

/* Reparieren: Maschine aus der Garage auswaehlen (Bilder antippen, kein Text noetig) */
.repgrid{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;max-height:52vh;overflow-y:auto;padding:6px 2px}
.repcard{width:92px;height:129px;background-size:cover;background-position:center;border-radius:10px;cursor:pointer;

.repcard:hover{transform:translateY(-7px) scale(1.07);border-color:#ffd479;box-shadow:0 14px 30px rgba(0,0,0,.65),0 0 22px rgba(255,207,63,.45)}

const SPECIALS = [
  {
    "id": "BOOSTER_FUEL",
    "kind": "booster",
    "gives": "fuel",
    "name": "Booster: Kanister",
    "img": "cards/BOOSTER_FUEL.png"
  },
  {
    "id": "BOOSTER_BAT",
    "kind": "booster",
    "gives": "bat",
    "name": "Booster: Batterie",
    "img": "cards/BOOSTER_BAT.png"
  },
  {
    "id": "ABSCHLEPPER",
    "kind": "tow",
    "name": "Abschlepper",
    "img": "cards/ABSCHLEPPER.png"
  }
];

const CARD_BACK = "cards/RUECKSEITE.png";

const WORLD_COLORS = { KOSMOS:'#3b6fd6', BAU:'#e6a81f', TRUCKS:'#d33b34', TECHNIK:'#37a85a' };

// ==== engine ====

// KOSMOBAGGER - Spiel-Engine (volle Regeln). Framework-frei, laeuft im Browser und in Node.
// Rundenstruktur: Einkommen -> gleichzeitig verdeckt bauen -> aufdecken/Kampf -> nachziehen.

const TANK_MAX = 3;
const BAT_MAX = 2;

function cost(kraft) { return kraft <= 2 ? 1 : (kraft <= 4 ? 2 : 3); }

function shuffle(a, rng = Math.random) {
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

let _uid = 1;
function inst(def) { return { ...def, uid: _uid++ }; }

// Baut eine Deckliste (Karten-Instanzen) nach Optionen.
function buildDeck(opts) {
  const cards = [];
  const copies = opts.deckDoubled ? 2 : 1;
  for (let c = 0; c < copies; c++) for (const m of MACHINES) cards.push(inst(m));
  if (opts.modules >= 2 || opts.boosters) {
    const bf = SPECIALS.find(s => s.id === "BOOSTER_FUEL");
    const bb = SPECIALS.find(s => s.id === "BOOSTER_BAT");
    for (let i = 0; i < (opts.boosters ?? 0); i++) cards.push(inst(i % 2 === 0 ? bf : bb));
  }
  const tow = SPECIALS.find(s => s.id === "ABSCHLEPPER");
  for (let i = 0; i < (opts.tows ?? 0); i++) cards.push(inst(tow));
  return cards;
}

function newPlayer(idx, name, isAI, opts, rng) {
  const deck = shuffle(buildDeck(opts), rng);
  const hand = [];
  for (let i = 0; i < 3 && deck.length; i++) hand.push(deck.pop());
  return {
    idx, name, isAI,
    deck, hand, garage: [],
    fuel: 0, bat: 0, crystals: 0,
    slot: null, slotTurbo: false,
    income: null,       // gewaehlte Einkommensart diese Runde
    pending: null,      // committed Aktion
  };
}

class Game {
  constructor(opts = {}) {
    this.opts = Object.assign({
      modules: 2, target: 5, deckDoubled: true, boosters: 4, tows: 2,
      names: ["Spieler", "Computer"], ai: [false, true], aiLevel: 0.85,
    }, opts);
    const rng = Math.random;
    this.players = [
      newPlayer(0, this.opts.names[0], this.opts.ai[0], this.opts, rng),
      newPlayer(1, this.opts.names[1], this.opts.ai[1], this.opts, rng),
    ];
    this.round = 0;
    this.phase = "income";     // income | commit | resolve | gameover
    this.winner = null;
    this.log = [];
    this.lastEvents = [];
    this.beginRound();
  }

  opp(i) { return this.players[1 - i]; }

  beginRound() {
    this.round++;
    for (const p of this.players) { p.income = null; p.pending = null; }
    this.phase = "act";
    for (const p of this.players) {
      if (this.opts.modules < 2) this.setIncome(p.idx, "fuel");      // Modul 1: immer Kanister
      if (p.isAI) {
        if (!p.income) this.setIncome(p.idx, this.aiIncome(p));
        p.pending = this.aiChoose(p);
      }
    }
  }

  aiIncome(p) {
    // Batterie holen, wenn Tank schon ordentlich gefuellt und Batteriefach Platz hat.
    if (this.opts.modules >= 2 && p.bat < BAT_MAX && p.fuel >= 2) return "bat";
    if (p.fuel < TANK_MAX) return "fuel";
    if (p.bat < BAT_MAX) return "bat";
    return "fuel";
  }

  setIncome(i, kind) {
    const p = this.players[i];
    if (p.income) return;
    p.income = kind;
    if (kind === "bat" && p.bat < BAT_MAX) p.bat++;
    else if (p.fuel < TANK_MAX) p.fuel++;
    else if (p.bat < BAT_MAX) p.bat++;       // Tank voll -> Batterie als Ausweich
  }

  needsIncome(i) { return this.opts.modules >= 2 && !this.players[i].income; }
  needsCommit(i) { return !this.players[i].pending; }
  ready() { return this.players.every(p => p.income && p.pending); }

  // --- Legale Aktionen fuer Spieler i in der Commit-Phase ---
  legalActions(i) {
    const p = this.players[i];
    const acts = [];
    if (p.slot) { acts.push({ type: "none", label: "Maschine kaempft weiter" }); return acts; }
    // Maschinen bauen (bezahlbar)
    for (const c of p.hand) {
      if (c.kraft && c.cost <= p.fuel) {
        acts.push({ type: "build", uid: c.uid, turbo: false });
        if (this.opts.modules >= 2 && p.bat > 0)
          acts.push({ type: "build", uid: c.uid, turbo: true });
      }
    }
    // Booster
    for (const c of p.hand) if (c.kind === "booster")
      acts.push({ type: "booster", uid: c.uid });
    // Abschlepper (modal)
    for (const c of p.hand) if (c.kind === "tow") {

      if (this.opts.modules >= 2) acts.push({ type: "tow", uid: c.uid, mode: "plus", plusType: "bat" });

          let idx = -1;
          if (a.uid != null) idx = p.garage.findIndex(c => c.uid === a.uid && c.kraft);

    this.players.forEach((p, i) => {
      if ((p.pending || {}).type === "tow" && p.pending.mode === "tow") {
        const o = this.opp(i);
        if (pre[o.idx]) {              // nur eine wirklich stehende Maschine
          const towed = pre[o.idx];
          o.garage.push(towed); o.slot = null; o.slotTurbo = false;

        }
      }
    });

    const a = this.players[0], b = this.players[1];

    const eb = b.slot ? b.slot.kraft + (b.slotTurbo ? 2 : 0) : null;
    if (a.slot && b.slot) {

    // 4) Nachziehen
    for (const p of this.players) this.drawUp(p);

    // 5) Sieg?
    for (const p of this.players) { p.income = null; p.pending = null; }

    if (win) { this.winner = win.idx; this.phase = "gameover"; ev.push({ t: "win", i: win.idx }); }
    else this.beginRound();

    this.lastEvents = ev;

  gain(p, kind) {
    if (kind === "bat") { if (p.bat < BAT_MAX) p.bat++; else if (p.fuel < TANK_MAX) p.fuel++; }

  drawUp(p) {

    const i = p.idx, o = this.opp(i);

    const affordable = p.hand.filter(c => c.kraft && c.cost <= p.fuel);
    const level = this.opts.aiLevel ?? 0.85;
    if (Math.random() > level) {                            // Schwaeche: manchmal zufaellig
      const pool = acts.filter(a => a.type === "build");
      if (pool.length) return pool[Math.floor(Math.random() * pool.length)];
    }
    const gk = o.slot ? o.slot.kraft : null;               // stehende Gegnermaschine
    const behind = p.crystals <= o.crystals;

    // Gegen eine stehende Wand, die ich nicht packe: Abschlepper (falls vorhanden)
    if (gk !== null) {
      const canBeat = affordable.some(c => c.kraft > gk || (p.bat > 0 && c.kraft + 2 > gk));
      const canTie = affordable.some(c => c.kraft === gk || (p.bat > 0 && c.kraft + 2 === gk));

      if (tow && !canBeat && !canTie && gk >= 4) return tow;
      // schlagen (billigste ausreichende), sonst gleichziehen
      const beats = affordable.filter(c => c.kraft > gk);
      const ties = affordable.filter(c => c.kraft === gk);
      if (beats.length) { const c = beats.sort((x, y) => x.cost - y.cost || x.kraft - y.kraft)[0]; return { type: "build", uid: c.uid, turbo: false }; }
      if (p.bat > 0) {
        const turboBeat = affordable.filter(c => c.kraft + 2 > gk && c.kraft <= gk);
        if (turboBeat.length) { const c = turboBeat.sort((x, y) => y.kraft - x.kraft)[0]; return { type: "build", uid: c.uid, turbo: true }; }
      }
      if (ties.length) { const c = ties[0]; return { type: "build", uid: c.uid, turbo: false }; }
    }

    if (affordable.length) {
      // Kein Gegner steht: groesste bezahlbare Maschine bauen (Sparen zahlt sich aus)
      const c = affordable.sort((x, y) => y.kraft - x.kraft)[0];
      const turbo = this.opts.modules >= 2 && p.bat > 0 && behind && c.kraft >= 4;
      return { type: "build", uid: c.uid, turbo };
    }
    // Nichts bezahlbar: Reparieren > Booster > Abschlepper-Plus > Pass
    if (acts.some(a => a.type === "repair")) {
      const best = p.garage.filter(c => c.kraft).sort((x, y) => y.kraft - x.kraft)[0];
      return best ? { type: "repair", uid: best.uid } : { type: "repair" };
    }
    const boost = acts.find(a => a.type === "booster");
    if (boost) return boost;
    const plus = acts.find(a => a.type === "tow" && a.mode === "plus");
    if (plus) return plus;
    return { type: "pass" };
  }
}

  const t = $(sel); if (!t || !t.classList) return;
  t.classList.remove("pulse"); void t.offsetWidth; t.classList.add("pulse");
  const on = t.querySelectorAll(".cell.on"); const last = on[on.length - 1];
  if (last) { last.classList.remove("justfilled"); void last.offsetWidth; last.classList.add("justfilled"); }
  const c = centerOf(sel); FX.ring(c.x, c.y, rgb || "255,224,130", 9); FX.sparkle(c.x, c.y, rgb || "255,232,150", 16);
}
function flyToken(img, toSel, from) {
  if (!fxOn()) return;
  const to = centerOf(toSel), s = from || { x: innerWidth / 2, y: innerHeight / 2 };
  const im = document.createElement("img"); im.className = "flytoken"; im.src = img;
  im.style.left = s.x + "px"; im.style.top = s.y + "px"; document.body.appendChild(im);
  requestAnimationFrame(() => { im.style.left = to.x + "px"; im.style.top = to.y + "px"; im.style.transform = "translate(-50%,-50%) scale(.55)"; im.style.opacity = "0"; });
  setTimeout(() => { im.remove(); flashNewCell(toSel); }, 560);   // beim Ankommen: neue Zelle poppt deutlich auf
}

// Grosser Kristall zum Durchkommen: poppt gross auf, haelt kurz, fliegt dann in den Zaehler.
function bigCrystalPop(x, y, toSel) {
  if (!fxOn()) return;
  FX.ring(x, y, "120,225,255", 13); FX.sparkle(x, y, "150,235,255", 28);
  const im = document.createElement("img"); im.className = "bigcrystal"; im.src = "assets/kristall.png";
  im.style.left = x + "px"; im.style.top = y + "px"; document.body.appendChild(im);
  setTimeout(() => {                       // vom grossen Standbild zum Zaehler fliegen
    im.style.animation = "none"; im.style.transform = "translate(-50%,-50%) scale(1.25)"; im.style.opacity = "1"; void im.offsetWidth;
    const to = centerOf(toSel);
    im.style.transition = "left .6s cubic-bezier(.4,.1,.2,1),top .6s cubic-bezier(.4,.1,.2,1),transform .6s,opacity .6s";
    im.style.left = to.x + "px"; im.style.top = to.y + "px"; im.style.transform = "translate(-50%,-50%) scale(.34)"; im.style.opacity = ".15";
  }, 620);
  setTimeout(() => { im.remove(); flashNewCell(toSel, "120,225,255"); }, 1280);
}

// Karte legen: hebt von der Hand ab, schwebt hoch ueber die Flaeche zum Bauplatz
// und setzt dort verdeckt auf (kein flaches Rutschen).
function flyCardToSlot(card) {
  return new Promise(res => {
    if (!fxOn() || !card) return res();
    const src = document.querySelector(`#meArea .mehand .card[data-uid="${card.uid}"]`);
    const slot = $("#meSlot");
    if (!src || !slot || !src.getBoundingClientRect || !slot.getBoundingClientRect) return res();
    const r = src.getBoundingClientRect(), t = slot.getBoundingClientRect();
    if (!r.width || !t.width) return res();
    const g = document.createElement("div");
    g.className = "flycard hover";
    g.style.backgroundImage = `url("${card.img}")`;
    g.style.left = r.left + "px"; g.style.top = r.top + "px";
    g.style.width = r.width + "px"; g.style.height = r.height + "px";
    document.body.appendChild(g);
    src.style.visibility = "hidden";
    requestAnimationFrame(() => {            // Ziel-Position/-Groesse; das Abheben macht die CSS-Animation
      g.style.left = t.left + "px"; g.style.top = t.top + "px";
      g.style.width = t.width + "px"; g.style.height = t.height + "px";
    });
    setTimeout(() => { g.style.backgroundImage = `url("${CARD_BACK}")`; }, 640);  // dreht sich beim Aufsetzen verdeckt
    setTimeout(() => { g.classList.add("land"); }, 800);                          // kurzes Aufsetzen
    setTimeout(() => { g.remove(); res(); }, 1000);
  });
}

// ---------- Welten-Effekte im Kampf ----------
function hexRgb(h) { const n = parseInt(String(h).slice(1), 16); return `${(n >> 16) & 255},${(n >> 8) & 255},${n & 255}`; }
function wRgb(card) { const c = card && WORLD_COLORS[card.world]; return c ? hexRgb(c) : "255,207,63"; }

// Jede Welt kaempft anders: Kosmos funkelt, Bau schuettet Schutt,
// Trucks qualmen und spruehen Funken, Technik entlaedt Energie.
function worldFx(card, p, strong = false) {
  if (!card || !p) return;
  const c = wRgb(card), n = strong ? 26 : 16;
  switch (card.world) {
    case "KOSMOS":
      FX.sparkle(p.x, p.y, c, n + 10);
      FX.sparkle(p.x, p.y, "200,225,255", n - 4);
      if (strong) FX.ring(p.x, p.y, c, 10);
      break;
    case "BAU":
      FX.burst(p.x, p.y, c, n, { spread: 7, g: 0.62 });            // Schutt faellt
      FX.burst(p.x, p.y, "158,146,124", n - 6, { spread: 3.5, g: 0.04 });  // Staubwolke
      break;
    case "TRUCKS":
      FX.burst(p.x, p.y, "122,124,138", n, { spread: 3.2, g: -0.05 });     // Qualm steigt
      FX.burst(p.x, p.y, "255,150,60", n - 4, { spread: 10, g: 0.5, long: true }); // Funken
      if (strong) FX.burst(p.x, p.y, c, 10, { spread: 8, g: 0.35 });
      break;
    case "TECHNIK":
      FX.sparkle(p.x, p.y, c, n + 6);
      FX.burst(p.x, p.y, "150,255,210", n - 4, { spread: 12, g: 0.02, long: true }); // Energie-Arcs
      if (strong) FX.ring(p.x, p.y, c, 8);
      break;
    default:
      FX.burst(p.x, p.y, c, n, { spread: 8 });
  }
}

// Menue-Hintergrund: Intro-Video (stumm, Endlosschleife). Fehlt assets/intro.mp4,
// bleibt einfach das Standbild arena.png stehen.
let introVid = null;
(() => {
  try {
    if (typeof document === "undefined" || typeof document.createElement !== "function") return;
    const wrap = document.createElement("div"); wrap.id = "introwrap";
    const v = document.createElement("video");
    v.muted = true; v.loop = true; v.autoplay = true; v.playsInline = true; v.preload = "auto";
    if (v.setAttribute) { v.setAttribute("playsinline", ""); v.setAttribute("muted", ""); }
    if (v.addEventListener) {
      v.addEventListener("error", () => { if (wrap.remove) wrap.remove(); });
      // Autoplay ist nicht garantiert: bei canplay erneut versuchen, notfalls beim ersten Tap.
      v.addEventListener("canplay", () => playIntro());
      v.addEventListener("loadeddata", () => playIntro());
    }
    if (document.addEventListener) document.addEventListener("pointerdown", () => playIntro(), { once: true });
    v.src = "assets/intro.mp4";
    wrap.appendChild(v);
    const app = $("#app");
    if (app && app.parentNode && app.parentNode.insertBefore) app.parentNode.insertBefore(wrap, app);
    else document.body.appendChild(wrap);
    introVid = v;   // Loop wird erst NACH dem Intro-Splash gestartet (sonst kaempfen 2 Videos)
  } catch (e) { /* headless o.ae.: egal */ }
})();

// Erster Start pro Sitzung: Intro EINMAL als Vollbild-Splash zeigen (Menue erst danach,
// nichts liegt darueber). Danach uebernimmt der Menue-Hintergrund-Loop.
(() => {
  try {
    if (typeof requestAnimationFrame !== "function") return;                 // headless: kein Splash
    if (typeof sessionStorage !== "undefined" && sessionStorage.getItem("kosmoIntroSeen")) { playIntro(); return; }
    const sp = document.createElement("div"); sp.id = "introsplash";
    const v = document.createElement("video");
    v.src = "assets/intro.mp4"; v.autoplay = true; v.muted = true; v.playsInline = true; v.preload = "auto";
    if (v.setAttribute) { v.setAttribute("playsinline", ""); v.setAttribute("muted", ""); }
    const skip = document.createElement("button"); skip.id = "introskip"; skip.textContent = "Überspringen ▸";
    const snd = document.createElement("div"); snd.id = "introsound"; snd.textContent = "🔊 Antippen für Ton";
    sp.appendChild(v); sp.appendChild(skip); sp.appendChild(snd);
    (document.body || document.documentElement).appendChild(sp);
    let done = false;
    const end = (grund) => {
      window.__splashLog = (window.__splashLog || []).concat(grund || "?");
      if (done) return; done = true;
      try { sessionStorage.setItem("kosmoIntroSeen", "1"); } catch (e) {}
      sp.classList.add("gone"); setTimeout(() => sp.remove && sp.remove(), 520);
      playIntro();                                                           // Menue-Loop sicher starten
    };
    v.addEventListener("ended", () => end("ended"));
    v.addEventListener("error", () => end("error:" + (v.error && v.error.code)));
    v.addEventListener("loadedmetadata", () => {                             // praezise am Videoende beenden
      if (v.duration && isFinite(v.duration)) setTimeout(() => end("dur"), v.duration * 1000 + 250);
    });
    skip.addEventListener("click", e => { e.stopPropagation(); end("skip"); });
    // Tippen aufs Video: Ton dazuschalten (Browser erlaubt das nur per Geste). Nicht abbrechen.
    sp.addEventListener("click", () => {
      if (v.muted) { v.muted = false; const q = v.play && v.play(); if (q && q.catch) q.catch(() => {}); snd.classList.add("gone"); }
    });
    const p = v.play(); if (p && p.catch) p.catch(() => {});                 // Abbruch NICHT als Ende werten
    setTimeout(() => end("timeout"), 15000);                                 // ultimatives Sicherheitsnetz
  } catch (e) {}
})();

// ---------- Rendering ----------
function cardEl(card, { back = false, small = false } = {}) {
  const d = document.createElement("div");
  d.className = "card" + (back ? " back" : "");
  d.style.backgroundImage = `url("${back ? CARD_BACK : card.img}")`;

}

// Anzeige beruecksichtigt die bereits getroffene (aber erst beim Aufdecken verrechnete) Wahl:
// bezahlter Treibstoff/Batterie verschwindet sofort aus dem Zaehler, die gespielte Karte
// verlaesst die Hand. Nur fuer die eigene Seite — beim Gegner wuerde das die Wahl verraten.
function pendPlayUid(p) { const t = p.pending && p.pending.type; return (t === "build" || t === "booster" || t === "tow") ? p.pending.uid : null; }
function dispFuel(p) { if (p.pending && p.pending.type === "build") { const c = game.handCard(p, p.pending.uid); if (c) return Math.max(0, p.fuel - c.cost); } return p.fuel; }
function dispBat(p) { return (p.pending && p.pending.type === "build" && p.pending.turbo && p.bat > 0) ? Math.max(0, p.bat - 1) : p.bat; }

function renderBoard() {
  const me = game.players[persp], op = game.players[1 - persp];
  // Info
  const meA = $("#meArea"), opA = $("#oppArea");
  meA.querySelector(".pname").textContent = me.name;
  opA.querySelector(".pname").textContent = op.name;
  for (const [area, p, isMe] of [[meA, me, true], [opA, op, false]]) {
    const f = isMe ? dispFuel(p) : p.fuel, b = isMe ? dispBat(p) : p.bat;
    area.querySelector(".tank").innerHTML = gauge("assets/kanister.png", f, TANK_MAX);
    area.querySelector(".batt").innerHTML = gauge("assets/batterie.png", b, BAT_MAX);
    area.querySelector(".crystals").innerHTML = gauge("assets/kristall.png", p.crystals, game.opts.target, true) + `<b>${p.crystals}/${game.opts.target}</b>`;
    area.querySelector(".batt").style.display = game.opts.modules >= 2 ? "" : "none";
  }

  // Gegnerhand (Rueckseiten)
  const oh = opA.querySelector(".opphand"); oh.innerHTML = "";
  for (let i = 0; i < op.hand.length; i++) oh.appendChild(cardEl(null, { back: true }));

  // Slots (stehende Maschinen)
  slotRenderPre($("#oppSlot"), op);
  slotRenderPre($("#meSlot"), me);
  if ($("#meDeck")) $("#meDeck").innerHTML = deckStack(me.deck.length);
  if ($("#oppDeck")) $("#oppDeck").innerHTML = deckStack(op.deck.length);

  // Meine Hand
  renderHand();
}

function gauge(icon, filled, total, gem) {
  let s = "";
  for (let i = 0; i < total; i++) s += `<i class="cell${i < filled ? " on" : ""}${gem ? " gem" : ""}"><img src="${icon}" alt=""></i>`;
  return s;
}

function pips(box, val, max, cls) {
  box.innerHTML = "";
  for (let i = 0; i < max; i++) {
    const s = document.createElement("span");
    if (i < val) s.className = cls;
    box.appendChild(s);
  }
}

// Vor dem Aufdecken: stehende Maschine offen, neu gespielte Karte verdeckt (Rueckseite).
function slotRenderPre(el, p) {
  if (p.slot && (!p.pending || p.pending.type === "none")) { slotShow(el, p.slot, p.slotTurbo); return; }
  const t = p.pending && p.pending.type;
  if (t === "build" || t === "booster" || t === "tow") {
    el.innerHTML = ""; el.classList.remove("empty");
    const c = cardEl(null, { back: true }); c.classList.add("pending");
    el.appendChild(c); return;
  }
  slotShow(el, p.slot, p.slotTurbo);
}

function slotShow(el, card, turbo) {
  el.innerHTML = ""; el.classList.toggle("empty", !card);
  if (card) {
    const c = cardEl(card); c.classList.add("idle");
    if (turbo) { const t = document.createElement("div"); t.className = "turbobadge"; t.textContent = "+2"; c.appendChild(t); }
    el.appendChild(c);
  }
}

let selUid = null;
let lastHandSet = new Set();
let lastHandOwner = -1;

// Tippen -> Aktionsmenue; Ziehen auf den eigenen Bauplatz -> direkt bauen/ausspielen.
function attachPlay(el, card) {
  let sx = 0, sy = 0, moved = false, dragging = false, ghost = null;
  const slot = () => $("#meSlot");
  const overSlot = ev => { const r = slot().getBoundingClientRect(); return ev.clientX > r.left && ev.clientX < r.right && ev.clientY > r.top && ev.clientY < r.bottom; };
  const onMove = ev => {
    if (!dragging && Math.hypot(ev.clientX - sx, ev.clientY - sy) > 8) {
      dragging = true; moved = true;
      ghost = el.cloneNode(true); ghost.classList.add("dragghost"); ghost.classList.remove("sel");
      document.body.appendChild(ghost); el.style.opacity = ".25";
    }
    if (dragging) { ghost.style.left = ev.clientX + "px"; ghost.style.top = ev.clientY + "px"; slot().classList.toggle("drop", overSlot(ev)); }
  };
  const onUp = ev => {
    document.removeEventListener("pointermove", onMove); document.removeEventListener("pointerup", onUp);
    if (ghost) ghost.remove(); el.style.opacity = ""; slot().classList.remove("drop");
    if (dragging && overSlot(ev)) {
      if (card.kraft) doCommit({ type: "build", uid: card.uid, turbo: false });
      else if (card.kind === "booster") doCommit({ type: "booster", uid: card.uid });
      else { selUid = card.uid; renderHand(); showActions(card); }     // Abschlepper: Menue (modal)
    } else if (!moved) { Snd.click(); selUid = card.uid; renderHand(); showActions(card); }
  };
  el.addEventListener("pointerdown", ev => {
    ev.preventDefault(); sx = ev.clientX; sy = ev.clientY; moved = false; dragging = false;
    document.addEventListener("pointermove", onMove); document.addEventListener("pointerup", onUp);
  });
}

function renderHand() {
  const me = game.players[persp];
  const row = $("#meArea .mehand"); row.innerHTML = ""; row.classList.add("hand");
  const canAct = acting && game.needsCommit(persp) && !game.needsIncome(persp);
  const affordableBuild = canAct && !me.slot;
  const hideUid = pendPlayUid(me);                 // schon gespielte Karte nicht mehr in der Hand zeigen
  const cards = me.hand.filter(c => c.uid !== hideUid);
  const n = cards.length, mid = (n - 1) / 2;
  const curSet = new Set(cards.map(c => c.uid));   // Deal-Animation nur fuer wirklich neue Karten (nicht beim Ablegen)
  const sameOwner = lastHandOwner === persp;
  cards.forEach((card, idx) => {
    const wrap = document.createElement("div"); wrap.className = "handcard";
    const rot = (idx - mid) * 3.4, lift = Math.abs(idx - mid) * 7;
    wrap.style.setProperty("--rot", rot + "deg");
    wrap.style.transform = `rotate(${rot}deg) translateY(${lift}px)`;
    const el = cardEl(card);
    el.dataset.uid = card.uid;                 // damit die Karte beim Legen wiedergefunden wird
    if (!sameOwner || !lastHandSet.has(card.uid)) { el.classList.add("deal"); el.style.setProperty("--i", idx); }
    const playableMachine = card.kraft && card.cost <= me.fuel && affordableBuild;
    const playableSpecial = (card.kind === "booster" || card.kind === "tow") && affordableBuild;
    if (canAct && (playableMachine || playableSpecial)) {
      el.classList.toggle("sel", selUid === card.uid);
      wrap.classList.add("play");
      attachPlay(el, card);
    } else if (canAct) {
      el.classList.add("dis");
    }
    wrap.appendChild(el); row.appendChild(wrap);
  });
  lastHandSet = curSet; lastHandOwner = persp;
}

// ---------- Aktionsleiste ----------
function clearActions() { $("#actionbar").innerHTML = ""; }
function addBtn(label, fn, ghost) {
  const b = document.createElement("button"); b.textContent = label; if (ghost) b.className = "ghost";
  b.addEventListener("click", fn); $("#actionbar").appendChild(b); return b;
}

function showActions(card) {
  const me = game.players[persp];
  clearActions();
  if (card.kraft) {
    addBtn(`Bauen  (${card.cost} ⛽)`, () => doCommit({ type: "build", uid: card.uid, turbo: false }));
    if (game.opts.modules >= 2 && me.bat > 0)
      addBtn(`Bauen + Turbo 🔋 (+2)`, () => doCommit({ type: "build", uid: card.uid, turbo: true }));
  } else if (card.kind === "booster") {
    addBtn(`Ausspielen: +1 ${card.gives === "bat" ? "🔋" : "⛽"}`, () => doCommit({ type: "booster", uid: card.uid }));
  } else if (card.kind === "tow") {
    if (game.players[1 - persp].slot) addBtn(`Abschleppen 🚛`, () => doCommit({ type: "tow", uid: card.uid, mode: "tow" }));
    addBtn(`Nachschub: +1 ⛽`, () => doCommit({ type: "tow", uid: card.uid, mode: "plus", plusType: "fuel" }));
    if (game.opts.modules >= 2) addBtn(`Nachschub: +1 🔋`, () => doCommit({ type: "tow", uid: card.uid, mode: "plus", plusType: "bat" }));
  }
  addBtn("Zurück", () => { selUid = null; renderHand(); baseActions(); }, true);
}

function baseActions() {
  const me = game.players[persp];
  clearActions();
  if (game.opts.modules >= 2 && me.bat >= 2 && me.garage.some(c => c.kraft))
    addBtn("Reparieren (2 🔋)", () => { Snd.click(); showRepairPick(); });
  addBtn("Sparen (nichts bauen)", () => doCommit({ type: "pass" }), true);
}

// Reparieren: Regel sagt "eine beliebige Maschine aus der Garage" -> Spieler waehlt.
function showRepairPick() {
  const me = game.players[persp];
  const machines = me.garage.filter(c => c.kraft);
  if (!machines.length) return;
  const cards = machines
    .map(c => `<div class="repcard" data-uid="${c.uid}" title="${c.name}" style="background-image:url('${c.img}')"></div>`)
    .join("");
  showOverlay(`<h2>Reparieren</h2><p>Welche Maschine holst du zurück?</p>
    <div class="repgrid">${cards}</div>
    <button class="big" id="repCancel" style="background:#131a30;color:#cfe;margin-top:14px">Zurück</button>`);
  $$("#overlay .repcard").forEach(el => el.addEventListener("click", () => {
    hideOverlay(); doCommit({ type: "repair", uid: +el.dataset.uid });
  }));
  $("#repCancel").onclick = () => { Snd.click(); hideOverlay(); baseActions(); };
}

// ---------- Ablauf ----------
let acting = false;

async function advance() {
  hideOverlay(); clearActions(); selUid = null;
  if (game.phase === "gameover") return winScreen();

  // Naechster Mensch, der noch handeln muss?
  const human = game.players.find(p => !p.isAI && (game.needsIncome(p.idx) || game.needsCommit(p.idx)));
  if (!human) return revealAndResolve();       // alle bereit (KI hat schon committed)

  persp = human.idx;
  const hot = cfg.mode === "hot";
  const otherHumanActed = game.players.some(p => !p.isAI && p.idx !== human.idx && p.pending);
  if (hot && otherHumanActed) {
    // Geraet weitergeben
    acting = false; renderBoardHidden();
    showOverlay(`<div class="pass-emoji">🔄</div><h2>${human.name} ist dran</h2>
      <p>Bildschirm an ${human.name} weitergeben, dann tippen.</p>
      <button class="big" id="goBtn">Bereit</button>`);
    $("#goBtn").onclick = () => startHumanTurn(human);
  } else {
    startHumanTurn(human);
  }
}

function renderBoardHidden() {
  // Tisch neutral (fuer Weitergabe): nichts Verraeterisches
  $("#meArea .mehand").innerHTML = "";
  $("#oppArea .opphand").innerHTML = "";
}

function startHumanTurn(human) {
  hideOverlay(); acting = true; persp = human.idx;
  renderBoard();
  if (game.needsIncome(human.idx)) return promptIncome(human);
  promptCommit(human);
}

function promptIncome(human) {
  clearActions();
  const m2 = game.opts.modules >= 2;
  // Symbole zum Abzaehlen statt Zahlen (Zielgruppe kann noch nicht lesen)
  const stat = `<div class="incstat">
      <span title="Treibstoff">${gauge("assets/kanister.png", human.fuel, TANK_MAX)}</span>
      ${m2 ? `<span title="Batterie">${gauge("assets/batterie.png", human.bat, BAT_MAX)}</span>` : ""}
      <span title="Kristalle">${gauge("assets/kristall.png", human.crystals, game.opts.target, true)}</span>
    </div>`;
  showOverlay(`<h2>Einkommen</h2><p>Nimm eines pro Runde — dein Vorrat:</p>${stat}
    <div style="display:flex;gap:12px;justify-content:center">
      <button class="big" style="max-width:170px" id="inFuel">⛽ Kanister</button>
      <button class="big" style="max-width:170px;background:linear-gradient(180deg,#5be08a,#28a35a)" id="inBat">🔋 Batterie</button>
    </div>`);
  const pick = async k => {
    game.setIncome(human.idx, k); hideOverlay();
    renderBoard();            // die Ressource ist schon da -> Anzeige zeigt sie
    const sel = k === "bat" ? "#meArea .batt" : "#meArea .tank";
    // das ankommende Symbol laesst die neu gefuellte Zelle deutlich aufpoppen
    flyToken(k === "bat" ? "assets/batterie.png" : "assets/kanister.png", sel, centerOf("#centerMsg"));
    await sleep(760);
    promptCommit(human);
  };
  $("#inFuel").onclick = () => pick("fuel");
  $("#inBat").onclick = () => pick("bat");
}

function promptCommit(human) {
  renderBoard();
  const acts = game.legalActions(human.idx);
  if (acts.length === 1 && acts[0].type === "none") {   // Maschine kaempft weiter -> keine Wahl
    flash(`${human.name}: deine Maschine kämpft weiter`);
    game.commit(human.idx, acts[0]); setTimeout(advance, 1300); return;
  }
  baseActions();
  const kannBauen = acts.some(a => ["build", "booster", "tow", "repair"].includes(a.type));
  const hint = document.createElement("div"); hint.className = "acthint";
  hint.textContent = kannBauen
    ? "Karte auf deinen Bauplatz ziehen oder antippen — oder „Sparen“."
    : "Noch nicht genug Treibstoff ⛽ — diese Runde sparen und weiter sammeln.";
  $("#actionbar").appendChild(hint);
  flash(`Runde ${game.round} · ${human.name}${human.name === "Du" ? " bist" : " ist"} dran`);
}

async function doCommit(action) {
  if (!acting) return;
  acting = false;
  clearActions(); selUid = null;
  const card = action.uid != null ? game.handCard(game.players[persp], action.uid) : null;
  if (card) {
    await flyCardToSlot(card);          // ~1 s: Karte schwebt auf den Bauplatz
    Snd.place();                        // Ton beim Aufsetzen, nicht beim Klick
  } else if (action.type === "repair") Snd.place();
  else Snd.click();
  game.commit(persp, action);
  renderBoard();                        // Bezahlung sofort sichtbar: Kanister/Batterie runter, Karte aus der Hand
  advance();
}

function flash(msg) { const el = $("#centerMsg"); if (!el) return; el.textContent = msg; el.classList.remove("pop"); void el.offsetWidth; el.classList.add("pop"); }

function pulseCrystals(i) {
  const area = (i === persp) ? $("#meArea") : $("#oppArea");
  const c = area && area.querySelector(".crystals"); if (!c) return;
  c.classList.remove("pulse"); void c.offsetWidth; c.classList.add("pulse");
}

// ---------- Aufdecken & Kampf ----------
async function revealAndResolve() {
  acting = false; persp = 0; renderBoard();
  await sleep(500);   // kurzer Atemzug, bevor der Countdown startet (Zielgruppe: langsamer)
  const A = game.players[0], B = game.players[1];
  const pre = [A.slot, B.slot];
  const disp = i => {
    const p = game.players[i], a = p.pending || { type: "pass" };
    if (a.type === "build") return { card: game.handCard(p, a.uid), turbo: a.turbo && p.bat > 0 };
    if (p.slot) return { card: p.slot, turbo: p.slotTurbo };
    if (a.type === "tow") return { card: game.handCard(p, a.uid), special: "🚛", label: "🚛 Abschlepper" };
    if (a.type === "booster") return { card: game.handCard(p, a.uid), special: "🛢", label: "🛢 Booster" };
    if (a.type === "repair") return { label: "🔧 Reparieren" };
    return { label: "💤 Sparen" };
  };
  // 3 – 2 – 1 – Aufdecken (Gefuehl von "gleichzeitig")
  for (const n of ["3", "2", "1"]) { flash(n); Snd.tick(); await sleep(680); }
  Snd.reveal();
  showSlotReveal($("#meSlot"), disp(0));
  showSlotReveal($("#oppSlot"), disp(1));
  flash("Aufdecken!");
  await sleep(1100);

  // --- Kampfsequenz (~2 s): nur wenn wirklich zwei Maschinen aufeinandertreffen ---
  const d0 = disp(0), d1 = disp(1);
  const fight = !!(d0.card && d0.card.kraft && d1.card && d1.card.kraft);
  if (fight) {
    flash("Kampf!");
    const meP = centerOf("#meSlot"), opP = centerOf("#oppSlot");
    const mc = $("#meSlot .card"), oc = $("#oppSlot .card");
    if (mc) mc.classList.add("fight");
    if (oc) oc.classList.add("fight");
    worldFx(d0.card, meP); worldFx(d1.card, opP);
    shake(0.45);
    await sleep(700);
    worldFx(d0.card, meP, true); worldFx(d1.card, opP, true);   // zweite, staerkere Welle
    shake(0.7);
    await sleep(700);
    if (mc) mc.classList.remove("fight");     // vor win/lose entfernen, sonst ueberschreibt es die Animation
    if (oc) oc.classList.remove("fight");
  }

  const ev = game.resolve();     // mutiert Zustand; danach lesen wir die Events
  // Kampf-Animation
  const clash = ev.find(e => e.t === "clash");
  const score = ev.find(e => e.t === "score");
  const towed = ev.find(e => e.t === "towed");
  const mid = centerOf("#centerMsg");
  if (towed) { flash("🚛 abgeschleppt!"); Snd.place(); FX.burst(centerOf("#oppSlot").x, centerOf("#oppSlot").y, "176,182,190", 20); }
  if (clash) {
    Snd.clash(); shake(clash.winner === -1 ? 1.3 : 1); flashScreen();
    FX.ring(mid.x, mid.y, "255,207,63"); FX.burst(mid.x, mid.y, "255,180,60", 30, { spread: 11 });
    if (fight) {   // beide Welten schlagen im Aufprall zusammen
      FX.burst(mid.x, mid.y, wRgb(d0.card), 16, { spread: 10, g: 0.3 });
      FX.burst(mid.x, mid.y, wRgb(d1.card), 16, { spread: 10, g: 0.3 });
    }
    const meP = centerOf("#meSlot"), opP = centerOf("#oppSlot");
    if (clash.winner === -1) {
      markSlot("#meSlot", "lose"); markSlot("#oppSlot", "lose"); FX.burst(mid.x, mid.y, "255,90,90", 30);
      floatText(meP.x + 88, meP.y, clash.ea, "#ffd479", true); floatText(opP.x + 88, opP.y, clash.eb, "#ffd479", true);
      flash(`Gleichstand ${clash.ea} : ${clash.eb} — beide in die Garage`);
    }
    else {
      const meWon = clash.winner === 0;
      markSlot(meWon ? "#meSlot" : "#oppSlot", "win");
      markSlot(meWon ? "#oppSlot" : "#meSlot", "lose");
      const lc = centerOf(meWon ? "#oppSlot" : "#meSlot"); FX.burst(lc.x, lc.y, "160,170,190", 30, { spread: 7 });
      floatText(meP.x + 88, meP.y, clash.ea, meWon ? "#7cfc9a" : "#ff8a8a", true);
      floatText(opP.x + 88, opP.y, clash.eb, meWon ? "#ff8a8a" : "#7cfc9a", true);
      const wn = meWon ? game.players[0].name : game.players[1].name;
      flash(`${clash.ea} : ${clash.eb} — ${wn} ${wn === "Du" ? "gewinnst" : "gewinnt"}`);
    }
  } else if (score) {
    // --- Durchkommen: die Maschine bricht durch die Luecke und holt den Kristall ---
    const meScored = score.i === 0;
    const sel = meScored ? "#meSlot" : "#oppSlot";
    const sc = centerOf(sel);
    const thruCard = meScored ? d0.card : d1.card;
    const el = $(sel + " .card");
    flash(`${game.players[score.i].name} kommt durch!`);
    if (el) el.classList.add("through");
    Snd.place();
    worldFx(thruCard, sc);                                  // Anfahren
    shake(0.5);
    await sleep(430);
    const gap = { x: sc.x, y: sc.y + (meScored ? -175 : 175) };   // dort, wo der Gegner fehlt
    worldFx(thruCard, gap, true);                           // Durchbruch
    FX.ring(gap.x, gap.y, "87,208,232", 10);
    await sleep(380);
    Snd.score();
    // Grosser Kristall poppt an der Luecke auf und wandert dann in den Zaehler
    bigCrystalPop(gap.x, gap.y, meScored ? "#meArea .crystals" : "#oppArea .crystals");
    floatText(sc.x + 96, sc.y, "+1", "#8cebff", true);
    flash(`${game.players[score.i].name} kommt durch — ein Kristall!`);
    pulseCrystals(score.i);
    await sleep(760);
    if (el) el.classList.remove("through");
  } else if (!towed) {
    flash("Nichts passiert");
  }
  const win = ev.find(e => e.t === "win");
  await sleep(win ? 1900 : 2600);   // Zahlen/Kristall stehen ~2,2 s -> Ergebnis nicht vorher wegnehmen
  advance();
}

function showSlotReveal(el, d) {
  const back = el.querySelector(".card.back");   // liegt eine verdeckte Karte hier?
  const build = flip => {
    el.innerHTML = ""; el.classList.remove("empty");
    if (d.card) {
      const c = cardEl(d.card); c.classList.add("reveal"); if (flip) c.classList.add("flipin");
      if (d.turbo) { const t = document.createElement("div"); t.className = "turbobadge"; t.textContent = "+2"; c.appendChild(t); }
      if (d.special) { const s = document.createElement("div"); s.className = "specialbadge"; s.textContent = d.special; c.appendChild(s); }
      el.appendChild(c);
      const r = el.getBoundingClientRect(); FX.ring(r.left + r.width / 2, r.top + r.height / 2, "150,190,255", 16);
    } else {
      el.classList.add("empty");
      const s = document.createElement("div"); s.style.cssText = "font-size:13px;color:#8aa;text-align:center;padding:6px";
      s.textContent = d.label || ""; el.appendChild(s);
    }
  };
  if (back && fxOn()) { back.classList.add("flipout"); setTimeout(() => build(true), 190); }
  else { build(!!back); }
}
function markSlot(sel, cls) { const c = $(sel).querySelector(".card"); if (c) c.classList.add(cls); }

// Vollbild-Videosequenz (Intro/Sieg/Niederlage). Stumm-Autoplay + Tippen fuer Ton + Weiter.
// Fehlt die Datei, geht es sofort weiter (onDone) -> App laeuft auch ohne Videos.
function playFullscreenVideo(src, onDone) {
  let called = false; const go = () => { if (called) return; called = true; try { onDone(); } catch (e) {} };
  if (!fxOn()) return go();
  const sp = document.createElement("div"); sp.className = "fsvideo";
  const v = document.createElement("video");
  v.src = src; v.autoplay = true; v.muted = true; v.playsInline = true; v.preload = "auto";
  if (v.setAttribute) { v.setAttribute("playsinline", ""); v.setAttribute("muted", ""); }
  const skip = document.createElement("button"); skip.className = "fsskip"; skip.textContent = "Weiter ▸";
  const snd = document.createElement("div"); snd.className = "fssound"; snd.textContent = "🔊 Antippen für Ton";
  sp.appendChild(v); sp.appendChild(skip); sp.appendChild(snd);
  document.body.appendChild(sp);
  let done = false;
  const end = () => { if (done) return; done = true; sp.classList.add("gone"); setTimeout(() => sp.remove && sp.remove(), 450); go(); };
  v.addEventListener("ended", end);
  v.addEventListener("error", end);
  v.addEventListener("loadedmetadata", () => { if (v.duration && isFinite(v.duration)) setTimeout(end, v.duration * 1000 + 250); });
  skip.addEventListener("click", e => { e.stopPropagation(); end(); });
  sp.addEventListener("click", () => { if (v.muted) { v.muted = false; const q = v.play && v.play(); if (q && q.catch) q.catch(() => {}); snd.classList.add("gone"); } });
  const p = v.play(); if (p && p.catch) p.catch(() => {});
  setTimeout(end, 15000);
}

function winScreen() {
  const w = game.players[game.winner];
  const humanWon = !w.isAI;
  const show = () => {
    FX.rain(); FX.burst(innerWidth / 2, innerHeight / 2, "255,207,63", 60, { spread: 14, g: 0.12 }); shake(1.4);
    humanWon ? Snd.win() : Snd.lose();
    showOverlay(`<div class="winbanner">🏆 ${w.name} ${w.name === "Du" ? "gewinnst" : "gewinnt"}!</div>
      <div class="wingems">${"◆".repeat(w.crystals)}</div>
      <p>${w.crystals} Kristalle gesammelt in ${game.round} Runden.</p>
      <button class="big" id="againBtn">Nochmal</button>
      <button class="big" id="menu2" style="background:#131a30;color:#cfe;margin-top:10px">Menü</button>`);
    $("#againBtn").onclick = () => { Snd.click(); startGame(); };
    $("#menu2").onclick = () => { Snd.click(); hideOverlay(); backToMenu(); };
  };
  // Sieg: Vollbild-Sequenz, dann Ergebnis. Niederlage: vorerst direkt Ergebnis
  // (gutes Lose-Video kommt, sobald Veo-Tageslimit frei ist -> dann hier "assets/lose.mp4").
  if (humanWon) playFullscreenVideo("assets/win.mp4", show);
  else show();
}
